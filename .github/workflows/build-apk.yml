  name: Build APK

  on:
    push:
      branches: [main]
    workflow_dispatch:

  jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'

        - name: Fix Maven repositories (disable Aliyun mirrors)
          run: |
            sed -i 's|maven { url = uri("https://maven.aliyun.com/repository/google") }|// &|g' settings.gradle.kts
            sed -i 's|maven { url = uri("https://maven.aliyun.com/repository/public") }|// &|g' settings.gradle.kts
            sed -i 's|maven { url = uri("https://maven.aliyun.com/repository/gradle-plugin") }|// &|g' settings.gradle.kts
            sed -i 's|maven { url = uri("https://maven.aliyun.com/repository/central") }|// &|g' settings.gradle.kts
        
        - name: Generate keystore
          run: |
            keytool -genkeypair -v -keystore release.keystore \
              -alias your_alias \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass 3498762309 \
              -keypass 3498762309 \
              -dname "CN=LianYu, OU=Dev, O=LianYu, L=Unknown, ST=Unknown, C=CN"

        - name: Set up Android SDK
          uses: android-actions/setup-android@v3
          with:
            packages: 'platforms;android-35 build-tools;35.0.1 platform-tools ndk;30.0.14904198'

        - name: Grant gradlew permission
          run: chmod +x gradlew

        - name: Build debug APK
          run: ./gradlew :app:assembleDebug
          env:
            LIANYU_STORE_PASSWORD: 3498762309
            LIANYU_KEY_ALIAS: your_alias
            LIANYU_KEY_PASSWORD: 3498762309

        - name: Upload APK
          uses: actions/upload-artifact@v4
          with:
            name: LianYu-debug-apk
            path: app/build/outputs/apk/debug/app-debug.apk
